<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FORGE · Forja tu físico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg2:#101010;--bg3:#181818;--border:#242424;--border2:#2e2e2e;
  --accent:#FF4D00;--accent2:#FFB800;--green:#00E676;--blue:#40C4FF;--purple:#CE93D8;
  --text:#F0F0F0;--text2:#AAAAAA;--muted:#555;--card:#111111;--r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
input,button,select{font-family:'DM Sans',sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

/* SETUP */
.setup-ov{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;}
.setup-ov.hidden{display:none;}
.setup-logo{font-family:'Bebas Neue';font-size:72px;letter-spacing:10px;background:linear-gradient(120deg,#FF4D00,#FFB800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1;}
.setup-tag{font-size:13px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:4px;margin-bottom:32px;}
.setup-form{width:100%;max-width:360px;}
.setup-steps{display:flex;gap:5px;margin-bottom:22px;}
.setup-step{flex:1;height:3px;border-radius:2px;background:var(--border);}
.setup-step.done{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.setup-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;margin-bottom:4px;}
.setup-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{font-family:'Bebas Neue';font-size:28px;letter-spacing:5px;background:linear-gradient(120deg,#FF4D00,#FFB800 60%,#FF4D00);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-streak{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:800;font-size:12px;padding:5px 12px;border-radius:20px;}
.hdr-bmi{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;background:var(--bg3);border:1px solid var(--border);padding:4px 9px;border-radius:8px;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,8,.99);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,4px);}
.bn{flex:1;border:none;background:none;color:var(--muted);padding:9px 2px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:color .2s;}
.bn svg{width:20px;height:20px;}
.bn.on{color:var(--accent);}

/* PAGES */
.page{display:none;padding-bottom:78px;}
.page.on{display:block;animation:pgIn .2s ease;}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* COMPONENTS */
.slbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:0 18px 10px;}
.mx{margin:0 16px 10px;}
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text);padding:12px 14px;font-size:15px;font-weight:600;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
select.inp{-webkit-appearance:none;}
.inp-row{display:flex;gap:10px;margin-bottom:12px;}
.inp-group{flex:1;}
.inp-group label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r2);color:#000;padding:13px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:opacity .15s;}
.btn-primary:active{opacity:.8;}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text2);padding:11px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;}
.btn-ghost:active{border-color:var(--accent);color:var(--accent);}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;}
.pill-h{background:rgba(255,77,0,.14);color:var(--accent);}
.pill-m{background:rgba(255,184,0,.14);color:var(--accent2);}
.pill-c{background:rgba(0,230,118,.11);color:var(--green);}

/* PBAR */
.pbar-wrap{margin:0 16px 14px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease;}

/* HOME */
.home-hero{margin:14px 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--blue));}
.stats-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 16px 10px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Bebas Neue';font-size:26px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

/* WEIGHT MINI */
.weight-mini{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.wchange{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;}
.wchange.up{background:rgba(0,230,118,.12);color:var(--green);}
.wchange.down{background:rgba(255,77,0,.12);color:var(--accent);}
.wchange.neu{background:var(--bg3);color:var(--muted);}
.wm-actions{display:flex;gap:8px;margin-top:12px;}
.wm-btn{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text2);padding:10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.wm-btn:active{border-color:var(--accent);color:var(--accent);}

/* WATER */

/* TODAY WORKOUT */
.today-wk{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;}

/* WORKOUT */
.dchip{flex-shrink:0;min-width:62px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);border-radius:12px;padding:9px 10px;font-size:10px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.dchip b{display:block;font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;color:var(--text);margin-bottom:2px;}
.dchip.on{border-color:var(--accent);background:rgba(255,77,0,.1);color:var(--accent);}
.dchip.on b{color:var(--accent);}
.dchip.rest-day{opacity:.35;}
.day-strip{display:flex;overflow-x:auto;gap:8px;padding:14px 16px;scrollbar-width:none;}
.day-strip::-webkit-scrollbar{display:none;}
.ex-hero{margin:0 16px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:17px;position:relative;overflow:hidden;}
.ex-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.ex-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .3s;}
.ex-card.done{border-color:rgba(0,230,118,.45);}
.ex-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 0;}
.ex-name{font-size:15px;font-weight:700;}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.ex-trend{font-size:12px;font-weight:800;margin-left:5px;}
.trend-up{color:var(--green);}
.trend-dn{color:var(--accent);}
.trend-eq{color:var(--muted);}
.sets-row{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px 12px;}
.set-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.set-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;}
.set-prev{font-size:9px;color:var(--muted);font-family:'Space Mono';}
.set-inp{width:50px;height:44px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;}
.set-inp:focus{border-color:var(--accent);}
.set-inp.ok{border-color:var(--green);background:rgba(0,230,118,.07);color:var(--green);}
.set-inp.worse{border-color:rgba(255,77,0,.5);}
.rest-row{padding:0 16px 13px;}
.rest-btn{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text2);padding:10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
.rest-btn:active{background:rgba(255,77,0,.1);border-color:var(--accent);color:var(--accent);}
.ex-tip{padding:8px 16px 13px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.55;}
.ex-last{padding:6px 16px 0;font-size:11px;color:var(--text2);border-top:1px solid var(--border);}
.done-banner{display:none;margin:0 16px 10px;background:linear-gradient(135deg,rgba(0,230,118,.12),rgba(0,230,118,.04));border:1px solid rgba(0,230,118,.25);border-radius:var(--r);padding:16px;text-align:center;}
.done-banner.show{display:block;}
.rest-view{text-align:center;padding:50px 24px;}

/* STATS PAGE */
.chart-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.prog-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.pi-name{flex:1;font-size:13px;font-weight:600;line-height:1.3;}
.pi-spark{flex-shrink:0;}
.pi-val{font-family:'Space Mono';font-size:13px;font-weight:700;min-width:38px;text-align:right;}
.bmi-bar-wrap{height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;margin:8px 0;}
.bmi-bar{height:100%;border-radius:6px;transition:width .5s ease;}
.stat-4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 10px;}
.s4-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.s4-val{font-family:'Bebas Neue';font-size:32px;line-height:1;}
.s4-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* WEIGHT LOG TABLE */
.wlog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.wlog-date{color:var(--text2);}
.wlog-kg{font-family:'Space Mono';font-weight:700;font-size:15px;}
.wlog-diff{font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;}

/* NUTRITION */
.meal-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;}
.meal-time-col{flex-shrink:0;text-align:right;min-width:46px;}
.meal-hr{font-family:'Bebas Neue';font-size:20px;color:var(--accent2);line-height:1;}
.meal-lbl-sm{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.meal-vline{width:2px;background:var(--border);border-radius:2px;align-self:stretch;}
.meal-body{flex:1;}
.meal-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.meal-desc{font-size:12px;color:var(--muted);line-height:1.55;}
.meal-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.mchip{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);}
.mchip.kc{color:var(--accent);border-color:rgba(255,77,0,.2);}
.mchip.pr{color:var(--green);border-color:rgba(0,230,118,.2);}
.mchip.ch{color:var(--blue);border-color:rgba(64,196,255,.2);}

/* PROFILE */
.prof-avatar{text-align:center;padding:20px 0 12px;}
.pa-circle{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:30px;color:#000;margin:0 auto 10px;}
.body-stats-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 16px 10px;}
.bs-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;}
.bs-val{font-family:'Bebas Neue';font-size:21px;line-height:1;}
.bs-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;}
.sr-left{display:flex;align-items:center;gap:12px;}
.sr-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sr-title{font-size:14px;font-weight:600;}
.sr-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* MODALS */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.on{opacity:1;pointer-events:all;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(60px);transition:transform .3s ease;}
.overlay.on .sheet{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.sheet-title{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;padding:10px 20px 4px;}
.sheet-sub{font-size:13px;color:var(--muted);padding:0 20px 14px;line-height:1.5;}
.sheet-body{padding:0 20px 20px;}
.big-inp{background:var(--bg3);border:2px solid var(--border);border-radius:14px;color:var(--text);font-family:'Bebas Neue';font-size:52px;letter-spacing:4px;text-align:center;outline:none;width:100%;padding:14px;transition:border-color .2s;}
.big-inp:focus{border-color:var(--accent);}

/* TIMER OVERLAY */
.timer-full{position:fixed;inset:0;z-index:500;background:rgba(6,6,6,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.timer-full.on{opacity:1;pointer-events:all;}
.timer-ring-wrap{position:relative;width:220px;height:220px;margin-bottom:26px;}
.timer-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.ring-bg circle{fill:none;stroke:var(--border);stroke-width:8;}
.ring-fg circle{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-num{font-family:'Bebas Neue';font-size:74px;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,#FF4D00,#FFB800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.timer-seglbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.timer-full.done .ring-fg circle{stroke:var(--green)!important;}
.timer-full.done .timer-num{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;background-clip:text;}
.tbtn{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);border-radius:50px;padding:12px 26px;font-size:14px;font-weight:700;cursor:pointer;}
.tbtn.go{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#000;}
.tadd{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:600;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;transition:transform .3s ease;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}

/* 1RM Calc */
.calc-result{font-family:'Bebas Neue';font-size:38px;color:var(--accent2);text-align:center;margin:8px 0 4px;}
.calc-note{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;}
</style>

  <script>
  if('serviceWorker' in navigator){
    const sw=`const CACHE='forge-v2';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('offline')));}); `;

  let _dp;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_dp=e;if(!window.matchMedia('(display-mode:standalone)').matches&&!localStorage.getItem('forge_installed'))setTimeout(()=>_showBanner(),3000);});
  function _showBanner(){
    if(document.getElementById('iBanner'))return;
    const el=document.createElement('div');
    el.id='iBanner';
    el.style.cssText='position:fixed;bottom:72px;left:16px;right:16px;z-index:800;background:linear-gradient(135deg,#FF4D00,#FFB800);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 32px rgba(255,77,0,.4);animation:slideUp .4s ease;';
    el.innerHTML=`<div><div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:#000;">INSTALAR FORGE</div><div style="font-size:12px;color:rgba(0,0,0,.7);margin-top:2px;">Añadir a pantalla de inicio como app</div></div><div style="display:flex;gap:8px;"><button onclick="_doInstall()" style="background:#000;color:#FF4D00;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;">Instalar</button><button onclick="document.getElementById('iBanner').remove()" style="background:rgba(0,0,0,.25);color:#000;border:none;border-radius:8px;padding:9px 12px;font-size:18px;cursor:pointer;">✕</button></div>`;
    document.body.appendChild(el);
  }
  function _doInstall(){if(_dp){_dp.prompt();_dp.userChoice.then(()=>{document.getElementById('iBanner')?.remove();localStorage.setItem('forge_installed','1');});}}
  </script>

  ]}
];

function setupInit(){
  if(U){showApp(); return;}
  const steps = document.getElementById('setupSteps');
  const content = document.getElementById('setupContent');
  let step = 0;
  let data = {};

  function render(){
    const s = SETUP_STEPS[step];
    steps.innerHTML = SETUP_STEPS.map((_,i)=>`<div class="setup-step${i<=step?' done':''}"></div>`).join('');
    let fieldsHtml = s.fields.map(f => {
      if(f.type === 'select'){
        return `<div class="inp-group" style="margin-bottom:14px;"><label>${f.label}</label>
          <select class="inp" id="sf_${f.id}">${f.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
      }
      return `<div class="inp-group" style="margin-bottom:14px;"><label>${f.label}${f.unit?` (${f.unit})`:''}</label>
        <input class="inp" type="${f.type}" id="sf_${f.id}" placeholder="${f.placeholder}"></div>`;
    }).join('');
    content.innerHTML = `
      <div class="setup-title">${s.title}</div>
      <div class="setup-sub">${s.sub}</div>
      ${fieldsHtml}
      <button class="btn-primary" onclick="setupNext()">${step < SETUP_STEPS.length-1 ? 'Continuar →' : '¡Empezar! 🔥'}</button>
      ${step>0?`<div style="height:8px"></div><button class="btn-ghost" onclick="setupBack()">← Atrás</button>`:''}
    `;
  }

  window.setupNext = function(){
    const s = SETUP_STEPS[step];
    for(const f of s.fields){
      const el = document.getElementById('sf_'+f.id);
      if(!el || !el.value.trim()){toast('Completa todos los campos'); return;}
      data[f.id] = f.type==='number' ? parseFloat(el.value) : el.value;
    }
    if(step < SETUP_STEPS.length-1){ step++; render(); }
    else {
      U = {name: data.name, age: data.age, height: data.height, weight: data.weight, goal: data.goal,
        joined: new Date().toISOString(), streak:0, lastWorkout:null};
      STATE.weights = [{date: new Date().toISOString().split('T')[0], kg: data.weight}];
      saveUser(); saveState();
      showApp();
    }
  };
  window.setupBack = function(){ if(step>0){step--; render();} };
  render();
}

function showApp(){
  document.getElementById('setupOv').classList.add('hidden');
  document.getElementById('mainHdr').style.display='';
  document.getElementById('mainNav').style.display='';
  document.querySelectorAll('.page').forEach(p=>p.style.display='');
  updateHeader();
  goPage('home');
}

function goPage(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+pg).classList.add('on');
  document.querySelector(`.bn[data-pg="${pg}"]`)?.classList.add('on');
  if(pg==='home') renderHome();
  else if(pg==='workout') renderWorkout();
  else if(pg==='stats') renderStats();
  else if(pg==='nutrition') renderNutrition();
  else if(pg==='profile') renderProfile();
}

  strip.innerHTML = DAYS.map(d => {
    const w = WK[d];
    return `<div class="dchip${d===day?' on':''}${w.rest?' rest-day':''}" onclick="renderWorkout('${d}')">
      <b>${SHORT[d]}</b>${w.icon}
    </div>`;
  }).join('');

  const wk = WK[day];
  const body = document.getElementById('workoutBody');
  if(wk.rest){
    body.innerHTML = `<div class="rest-view"><div style="font-size:64px">😴</div><div style="font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;margin:12px 0 6px;">Día de Descanso</div><div style="font-size:14px;color:var(--muted);">Deja que el músculo crezca. Hidrátate, duerme y come bien.</div></div>`;
    document.getElementById('pbarFill').style.width='0%';
    return;
  }

  const stateDay = STATE[day] || {};
  const done = stateDay.done || [];
  const total = wk.exercises.length;
  const pct = total ? Math.round(done.length/total*100) : 0;
  document.getElementById('pbarFill').style.width = pct+'%';

  // Hero
  let html = `<div class="ex-hero">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;">${wk.icon} ${wk.focus}</div>
      <span class="pill pill-h">${wk.duration}</span>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${wk.type}</div>
    <div style="font-size:11px;color:var(--text2);line-height:1.55;">🔥 ${wk.warmup}</div>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
      <div style="font-size:12px;color:var(--text2);">${done.length}/${total} completados</div>
      <div style="flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div></div>
      <div style="font-size:12px;color:var(--text2);">${pct}%</div>
    </div>
  </div>`;

  // Done banner
  html += `<div class="done-banner${pct===100?' show':''}" id="doneBanner">
    <div style="font-size:32px;">🏆</div>
    <div style="font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;margin:4px 0;">¡Entreno completado!</div>
    <div style="font-size:12px;color:rgba(0,230,118,.8);">Bien hecho. Descansa y come bien.</div>
  </div>`;

  // Exercises by block
  wk.blocks.forEach((blk, bi) => {
    html += `<div class="slbl" style="padding-top:14px;"><span style="color:${blk.color}">${blk.label}</span></div>`;
    wk.exercises.filter(e=>e.block===bi).forEach(ex => {
      const isDone = done.includes(ex.id);
      const savedSets = (STATE[day]?.sets||{})[ex.id] || [];
      const isTime = ex.isTime;

      // Build sets rows
      let setsHtml = `<div style="padding:0 16px 12px;">
        <div style="display:grid;grid-template-columns:28px 1fr${isTime?'':' 1fr'} 44px;gap:6px;align-items:center;margin-bottom:6px;">
          <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center;">S</div>
          ${isTime
            ? `<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center;">Tiempo (s)</div>`
            : `<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center;">Reps</div>
               <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center;">Kg</div>`
          }
          <div></div>
        </div>`;

      for(let s=0; s<ex.sets; s++){
        const sv = savedSets[s] || {};
        const setDone = sv.done || false;
        setsHtml += `<div id="setrow_${ex.id}_${s}" style="display:grid;grid-template-columns:28px 1fr${isTime?'':' 1fr'} 44px;gap:6px;align-items:center;margin-bottom:6px;">
          <div style="width:26px;height:26px;border-radius:50%;background:${setDone?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${setDone?'#000':'var(--muted)'};">${s+1}</div>
          ${isTime
            ? `<input type="number" inputmode="numeric" placeholder="${ex.reps.replace('s','')}"
                style="height:36px;background:var(--bg3);border:1.5px solid ${setDone?'var(--green)':'var(--border)'};border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;width:100%;"
                value="${sv.time||''}"
                onchange="saveSetVal('${day}','${ex.id}',${s},'time',this.value)">`
            : `<input type="number" inputmode="numeric" placeholder="${isNaN(parseInt(ex.reps))?'—':parseInt(ex.reps)}"
                style="height:36px;background:var(--bg3);border:1.5px solid ${setDone?'var(--green)':'var(--border)'};border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;width:100%;"
                value="${sv.reps||''}"
                onchange="saveSetVal('${day}','${ex.id}',${s},'reps',this.value)">
               <input type="number" inputmode="decimal" placeholder="kg"
                style="height:36px;background:var(--bg3);border:1.5px solid ${setDone?'var(--green)':'var(--border)'};border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;width:100%;"
                value="${sv.kg||''}"
                onchange="saveSetVal('${day}','${ex.id}',${s},'kg',this.value)">`
          }
          <button onclick="toggleSetDone('${day}','${ex.id}',${s})" style="height:36px;width:44px;border-radius:8px;border:1.5px solid ${setDone?'var(--green)':'var(--border)'};background:${setDone?'rgba(0,230,118,.12)':'var(--bg3)'};color:${setDone?'var(--green)':'var(--muted)'};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
            ${setDone?'✓':'○'}
          </button>
        </div>`;
      }
      setsHtml += `</div>`;

      html += `<div class="ex-card${isDone?' done':''}" id="excard_${ex.id}">
        <div class="ex-head">
          <div>
            <div class="ex-name" onclick="showMuscle('${ex.id}')" style="cursor:pointer">${ex.name} <span style="font-size:11px;color:var(--muted)">💪</span></div>
            <div class="ex-meta">${ex.sets} series · ${ex.reps} · <span class="pill pill-${ex.rt==='heavy'?'h':ex.rt==='medium'?'m':'c'}">${ex.rt}</span></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            ${isDone ? `<span style="color:var(--green);font-size:18px;">✓</span>` : `<button onclick="markDone('${day}','${ex.id}')" style="background:var(--accent);border:none;border-radius:8px;color:#000;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;">✓ Hecho</button>`}
          </div>
        </div>
        ${ex.tip ? `<div class="ex-tip">💡 ${ex.tip}</div>` : ''}
        ${setsHtml}
        <div class="rest-row" style="padding-top:0;">
          <button class="rest-btn" onclick="startTimer(${REST_SECS[ex.rt]||60},'${ex.name}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Descanso ${REST_SECS[ex.rt]||60}s
          </button>
        </div>
      </div>`;
    });
  });

  body.innerHTML = html;
}

function saveSetVal(day, exId, setIdx, field, value){
  if(!STATE[day]) STATE[day] = {done:[], sets:{}};
  if(!STATE[day].sets) STATE[day].sets = {};
  if(!STATE[day].sets[exId]) STATE[day].sets[exId] = [];
  if(!STATE[day].sets[exId][setIdx]) STATE[day].sets[exId][setIdx] = {};
  STATE[day].sets[exId][setIdx][field] = value;
  saveState();
}

function toggleSetDone(day, exId, setIdx){
  if(!STATE[day]) STATE[day] = {done:[], sets:{}};
  if(!STATE[day].sets) STATE[day].sets = {};
  if(!STATE[day].sets[exId]) STATE[day].sets[exId] = [];
  if(!STATE[day].sets[exId][setIdx]) STATE[day].sets[exId][setIdx] = {};
  const cur = STATE[day].sets[exId][setIdx].done || false;
  STATE[day].sets[exId][setIdx].done = !cur;
  saveState();

  // Update UI without full re-render
  const row = document.getElementById(`setrow_${exId}_${setIdx}`);
  if(!row) return;
  const isDone = !cur;
  const circle = row.children[0];
  const btn = row.lastElementChild;
  circle.style.background = isDone ? 'var(--green)' : 'var(--border)';
  circle.style.color = isDone ? '#000' : 'var(--muted)';
  btn.style.borderColor = isDone ? 'var(--green)' : 'var(--border)';
  btn.style.background = isDone ? 'rgba(0,230,118,.12)' : 'var(--bg3)';
  btn.style.color = isDone ? 'var(--green)' : 'var(--muted)';
  btn.textContent = isDone ? '✓' : '○';
  // Update inputs border color
  Array.from(row.querySelectorAll('input')).forEach(inp => {
    inp.style.borderColor = isDone ? 'var(--green)' : 'var(--border)';
  });

  // Auto-start rest timer when set done
  if(isDone){
    const wk = WK[day];
    const ex = wk?.exercises?.find(e=>e.id===exId);
    if(ex) startTimer(REST_SECS[ex.rt]||60, ex.name);
  }
}

function markDone(day, exId){
  if(!STATE[day]) STATE[day] = {done:[], sets:{}};
  if(!STATE[day].done.includes(exId)){
    STATE[day].done.push(exId);
    checkStreak(day);
    saveState();
    renderWorkout(day);
    toast('¡Ejercicio completado! 💪');
  }
}

function checkStreak(day){
  const today = todayKey();
  if(day !== today) return;
  const wk = WK[today];
  if(wk.rest) return;
  const done = STATE[today]?.done||[];
  if(done.length >= wk.exercises.length){
    const lastWO = U.lastWorkout;
    const todayStr = new Date().toISOString().split('T')[0];
    if(lastWO !== todayStr){
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const yestStr = yest.toISOString().split('T')[0];
      U.streak = (lastWO === yestStr ? (U.streak||0)+1 : 1);
      U.lastWorkout = todayStr;
      saveUser(); updateHeader();
    }
  }
}

function renderStats(){
  const weights = STATE.weights || [];
  const bmi = U.weight && U.height ? (U.weight / ((U.height/100)**2)).toFixed(1) : '—';
  const bmiPct = Math.min(100, Math.max(0, ((parseFloat(bmi)-15)/25)*100));
  const bmiColor = bmi<18.5?'var(--blue)':bmi<25?'var(--green)':bmi<30?'var(--accent2)':'var(--accent)';

  let totalWOs = 0;
  DAYS.forEach(d => { if(STATE[d]?.done?.length) totalWOs++; });

  let html = `
    <div style="height:12px"></div>
    <div class="slbl">Resumen semanal</div>
    <div class="stat-4">
      <div class="s4-card"><div class="s4-val" style="color:var(--accent)">${U.streak||0}</div><div class="s4-lbl">Racha días</div></div>
      <div class="s4-card"><div class="s4-val" style="color:var(--green)">${totalWOs}</div><div class="s4-lbl">Sesiones</div></div>
      <div class="s4-card"><div class="s4-val" style="color:var(--accent2)">${U.weight||'—'}</div><div class="s4-lbl">Peso kg</div></div>
      <div class="s4-card"><div class="s4-val" style="color:var(--blue)">${bmi}</div><div class="s4-lbl">IMC</div></div>
    </div>

    <div class="slbl">Índice de Masa Corporal</div>
    <div class="chart-card">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;">
        <span>Bajo</span><span>Normal</span><span>Sobrepeso</span><span>Obesidad</span>
      </div>
      <div class="bmi-bar-wrap"><div class="bmi-bar" style="width:${bmiPct}%;background:${bmiColor}"></div></div>
      <div style="text-align:center;font-family:'Bebas Neue';font-size:36px;color:${bmiColor};margin-top:8px;">${bmi}</div>
    </div>

    <div class="slbl">Historial de peso</div>
    <div class="chart-card" style="padding:0;">
  `;

  if(weights.length < 2){
    html += `<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted);">Registra más pesos para ver tu evolución.</div>`;
  } else {
    weights.slice(-10).forEach((w,i,arr) => {
      const prev = i>0 ? arr[i-1].kg : null;
      const diff = prev ? (w.kg - prev).toFixed(1) : null;
      const diffClass = !diff ? '' : diff>0 ? 'up' : 'down';
      html += `<div class="wlog-row">
        <span class="wlog-date">${w.date}</span>
        <span class="wlog-kg">${w.kg} kg</span>
        ${diff ? `<span class="wlog-diff ${diffClass}" style="background:${diff>0?'rgba(0,230,118,.12)':'rgba(255,77,0,.12)'};color:${diff>0?'var(--green)':'var(--accent)'}">${diff>0?'+':''}${diff}kg</span>` : ''}
      </div>`;
    });
  }
  html += `</div>`;

  // Progress by exercise
  html += `<div class="slbl" style="padding-top:14px;">Progreso por ejercicio</div><div style="margin:0 16px 80px;">`;
  DAYS.forEach(d => {
    const wk = WK[d];
    if(wk.rest) return;
    wk.exercises.forEach(ex => {
      const done = STATE[d]?.done?.includes(ex.id);
      html += `<div class="prog-item">
        <div class="pi-name">${ex.name}<br><span style="font-size:10px;color:var(--muted)">${SHORT[d]}</span></div>
        <div class="pi-val" style="color:${done?'var(--green)':'var(--muted)'}">${done?'✓':'–'}</div>
      </div>`;
    });
  });
  html += `</div>`;

  document.getElementById('statsBody').innerHTML = html;
}

function saveProfile(){
  U.name = document.getElementById('ep_name').value || U.name;

  U.height = parseFloat(document.getElementById('ep_height').value) || U.height;
  const newW = parseFloat(document.getElementById('ep_weight').value);
  if(newW && newW !== U.weight){
    U.weight = newW;
    if(!STATE.weights) STATE.weights=[];
    STATE.weights.push({date: new Date().toISOString().split('T')[0], kg: newW});
    saveState();
  }
  saveUser(); updateHeader(); closeModal('editOv'); renderProfile();
  toast('Perfil actualizado ✓');
}

function confirmReset(){
  if(confirm('¿Borrar todos los datos y reiniciar la app?')){
    localStorage.clear(); location.reload();
  }
}

function updateWFeedback(val){
  const v = parseFloat(val);
  if(!v || !U) return;
  const prev = U.weight;
  const diff = (v - prev).toFixed(1);
  const el = document.getElementById('wFeedback');
  if(!el) return;
  el.innerHTML = diff > 0
    ? `<span style="color:var(--accent2)">+${diff}kg vs anterior (${prev}kg)</span>`
    : diff < 0
    ? `<span style="color:var(--green)">${diff}kg vs anterior (${prev}kg) 📉</span>`
    : `<span style="color:var(--muted)">Sin cambio vs anterior (${prev}kg)</span>`;
}

function saveWeight(){
  const v = parseFloat(document.getElementById('wInp').value);
  if(!v || v<30 || v>300){ toast('Peso inválido'); return; }
  U.weight = v;
  if(!STATE.weights) STATE.weights = [];
  const today = new Date().toISOString().split('T')[0];
  const last = STATE.weights[STATE.weights.length-1];
  if(last && last.date === today) last.kg = v;
  else STATE.weights.push({date: today, kg: v});
  saveUser(); saveState(); updateHeader(); closeModal('wOv');
  toast('Peso guardado ✓');
}

// 1RM CALC
// ════════════════════════════════════════════════════════
function calcOrm(){
  const w = parseFloat(document.getElementById('ormW').value);
  const r = parseInt(document.getElementById('ormR').value);
  if(!w || !r) return;
  const orm = (w * (1 + r/30)).toFixed(1);
  document.getElementById('ormRes').textContent = orm + ' kg';
  document.getElementById('ormNote').innerHTML = `
    <div>60% → ${(orm*0.6).toFixed(0)}kg &nbsp; 70% → ${(orm*0.7).toFixed(0)}kg</div>
    <div>80% → ${(orm*0.8).toFixed(0)}kg &nbsp; 90% → ${(orm*0.9).toFixed(0)}kg</div>
    <div style="margin-top:6px;color:var(--accent)">Fórmula Epley · estimación teórica</div>
  `;
}

// ════════════════════════════════════════════════════════
// MUSCLE MODAL (simplified)
// ════════════════════════════════════════════════════════
const MUSCLE_NAMES = {
  chest:'Pectoral',chest_up:'Pectoral superior',chest_low:'Pectoral inferior',
  triceps:'Tríceps',front_delt:'Deltoides anterior',abs:'Abdominales',
  obliques:'Oblicuos',hip_flexors:'Flexores cadera',lats:'Dorsal ancho',
  trapezius:'Trapecio',biceps:'Bíceps',quads:'Cuádriceps',
  hamstrings:'Isquiotibiales',glutes:'Glúteos',calves:'Gemelos',
  lumbar:'Lumbar',rear_delt:'Deltoides posterior'
};

// Zonas musculares sobre la imagen (300x200 canvas, imagen ~600x200 original recortada a vista frontal izq)
// La imagen tiene 3 vistas: frontal(izq), trasera(centro), lateral(der)
// Usamos solo la vista frontal para músculos anteriores y trasera para posteriores
// Coordenadas normalizadas [x, y, rx, ry] sobre canvas 300x200 (vista frontal)
const MUSCLE_ZONES = {
  // Vista FRONTAL (0..0.33 de la imagen original)
  chest:      [{view:'front', x:0.50, y:0.25, rx:0.14, ry:0.08}],
  chest_up:   [{view:'front', x:0.50, y:0.20, rx:0.12, ry:0.05}],
  chest_low:  [{view:'front', x:0.50, y:0.30, rx:0.12, ry:0.05}],
  front_delt: [{view:'front', x:0.32, y:0.21, rx:0.06, ry:0.06},{view:'front', x:0.68, y:0.21, rx:0.06, ry:0.06}],
  triceps:    [{view:'front', x:0.27, y:0.33, rx:0.05, ry:0.08},{view:'front', x:0.73, y:0.33, rx:0.05, ry:0.08}],
  biceps:     [{view:'front', x:0.29, y:0.30, rx:0.05, ry:0.07},{view:'front', x:0.71, y:0.30, rx:0.05, ry:0.07}],
  abs:        [{view:'front', x:0.50, y:0.40, rx:0.09, ry:0.10}],
  obliques:   [{view:'front', x:0.37, y:0.40, rx:0.06, ry:0.08},{view:'front', x:0.63, y:0.40, rx:0.06, ry:0.08}],
  hip_flexors:[{view:'front', x:0.50, y:0.53, rx:0.10, ry:0.05}],
  quads:      [{view:'front', x:0.43, y:0.67, rx:0.08, ry:0.12},{view:'front', x:0.57, y:0.67, rx:0.08, ry:0.12}],
  calves:     [{view:'front', x:0.43, y:0.87, rx:0.05, ry:0.07},{view:'front', x:0.57, y:0.87, rx:0.05, ry:0.07}],
  // Vista TRASERA (0.33..0.66 de la imagen original)
  trapezius:  [{view:'back', x:0.50, y:0.18, rx:0.12, ry:0.07}],
  lats:       [{view:'back', x:0.38, y:0.30, rx:0.08, ry:0.10},{view:'back', x:0.62, y:0.30, rx:0.08, ry:0.10}],
  rear_delt:  [{view:'back', x:0.30, y:0.20, rx:0.07, ry:0.06},{view:'back', x:0.70, y:0.20, rx:0.07, ry:0.06}],
  glutes:     [{view:'back', x:0.50, y:0.52, rx:0.14, ry:0.08}],
  hamstrings: [{view:'back', x:0.42, y:0.67, rx:0.08, ry:0.10},{view:'back', x:0.58, y:0.67, rx:0.08, ry:0.10}],
  lumbar:     [{view:'back', x:0.50, y:0.38, rx:0.09, ry:0.06}],
};

function showMuscle(exId){
  let ex = null;
  DAYS.forEach(d=>{ WK[d].exercises?.forEach(e=>{ if(e.id===exId) ex=e; }); });
  if(!ex) return;

  const muscles = ex.muscles || [];
  const muscleNames = muscles.map(m=>MUSCLE_NAMES[m]||m).join(' · ');

  document.getElementById('muscleTitle').textContent = ex.name;
  document.getElementById('muscleSubtitle').textContent = muscleNames;
  document.getElementById('muscleCues').innerHTML = `<div style="font-size:12px;color:var(--text2);line-height:1.6;">💡 ${ex.tip}</div>`;
  document.getElementById('muscleHist').innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Músculos implicados</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;">
      ${muscles.map(m=>`<span style="background:rgba(255,77,0,.15);color:var(--accent);border:1px solid rgba(255,77,0,.3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;">${MUSCLE_NAMES[m]||m}</span>`).join('')}
    </div>
  `;

  // Draw on canvas
  const canvas = document.getElementById('muscleCanvas');
  const ctx = canvas.getContext('2d');

  // Determine which views are needed
  const needsFront = muscles.some(m => (MUSCLE_ZONES[m]||[]).some(z=>z.view==='front'));
  const needsBack  = muscles.some(m => (MUSCLE_ZONES[m]||[]).some(z=>z.view==='back'));

  // Canvas size
  const CW = 560, CH = 200;
  canvas.width = CW; canvas.height = CH;
  canvas.style.width = '100%'; canvas.style.height = 'auto';

  // Draw the body image
  const img = MUSCLE_IMG;
  const drawAndHighlight = () => {
    ctx.clearRect(0,0,CW,CH);
    // Draw full image scaled to canvas
    ctx.drawImage(img, 0, 0, CW, CH);

    // Semi-dark overlay on non-highlighted areas
    ctx.fillStyle = 'rgba(8,8,8,0.45)';
    ctx.fillRect(0,0,CW,CH);

    // Redraw the body image at lower opacity so it stays visible
    ctx.globalAlpha = 0.7;
    ctx.drawImage(img, 0, 0, CW, CH);
    ctx.globalAlpha = 1;

    // Highlight muscle zones
    muscles.forEach(m => {
      const zones = MUSCLE_ZONES[m] || [];
      zones.forEach(z => {
        // Calculate x offset based on view
        let xOffset = 0;
        if(z.view === 'back') xOffset = 0.33;
        else if(z.view === 'side') xOffset = 0.66;

        const cx = (xOffset + z.x * 0.33) * CW;
        const cy = z.y * CH;
        const rx = z.rx * 0.33 * CW;
        const ry = z.ry * CH;

        // Glow effect
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx,ry)*1.5);
        grad.addColorStop(0, 'rgba(255,77,0,0.85)');
        grad.addColorStop(0.5, 'rgba(255,100,0,0.45)');
        grad.addColorStop(1, 'rgba(255,77,0,0)');
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx*1.5, ry*1.5, 0, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Solid ellipse
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,77,0,0.55)';
        ctx.fill();
        ctx.strokeStyle = '#FF4D00';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    });

    // Labels for views
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '9px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FRONTAL', CW*0.165, CH-6);
    ctx.fillText('TRASERA', CW*0.5, CH-6);
    ctx.fillText('LATERAL', CW*0.835, CH-6);
  };

  if(img.complete && img.naturalWidth > 0){
    drawAndHighlight();
  } else {
    img.onload = drawAndHighlight;
  }

  openModal('muscleOv');
}

function closeMuscle(){ closeModal('muscleOv'); }

// ════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════
let timerInterval = null, timerLeft = 0, timerTotal = 0, timerPaused = false;

function startTimer(secs, label){
  timerLeft = secs; timerTotal = secs; timerPaused = false;
  document.getElementById('timerFull').classList.add('on');
  document.getElementById('timerFull').classList.remove('done');
  document.getElementById('timerExLbl').textContent = label || '';
  document.getElementById('pauseBtn').textContent = 'Pausar';
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(timerPaused) return;
    timerLeft--;
    if(timerLeft <= 0){
      clearInterval(timerInterval);
      timerLeft = 0;
      document.getElementById('timerFull').classList.add('done');
      if('vibrate' in navigator) navigator.vibrate([200,100,200]);
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  document.getElementById('timerNum').textContent = timerLeft;
  const pct = timerTotal > 0 ? timerLeft/timerTotal : 0;
  const circ = 615.75;
  document.getElementById('ringFg').style.strokeDashoffset = (circ - circ*pct);
}

function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById('timerFull').classList.remove('on','done');
}

function togglePause(){
  timerPaused = !timerPaused;
  document.getElementById('pauseBtn').textContent = timerPaused ? 'Reanudar' : 'Pausar';
}

function addTime(s){
  timerLeft = Math.max(0, timerLeft + s);
  timerTotal = Math.max(timerTotal, timerLeft);
  updateTimerDisplay();
}

// ════════════════════════════════════════════════════════
// MODALS / TOAST
// ════════════════════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('on'); }
function closeModal(id){ document.getElementById(id).classList.remove('on'); }

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('on'), 2200);
}
